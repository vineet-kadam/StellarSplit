name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./frontend
        run: |
          rm -rf node_modules package-lock.json
          npm install
          
      - name: Run tests
        working-directory: ./frontend
        run: npm test

      - name: Build application
        working-directory: ./frontend
        run: npm run build

  contract-test:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true

      - name: Test Group Expense Contract
        working-directory: ./contracts/group_expense_contract
        run: cargo test --release

      - name: Test Settlement Contract
        working-directory: ./contracts/settlement_contract
        run: cargo test --release

      - name: Build Group Expense Contract
        working-directory: ./contracts/group_expense_contract
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Build Settlement Contract
        working-directory: ./contracts/settlement_contract
        run: cargo build --target wasm32-unknown-unknown --release
